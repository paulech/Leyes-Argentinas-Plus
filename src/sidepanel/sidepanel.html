<!doctype html>
<html lang="es-AR">
<head>
  <meta charset="utf-8" />
  <title>Leyes-Plus Argentina · Panel Lateral</title>
  <link rel="stylesheet" href="../styles/tokens.css" />
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body class="ilp-root" data-theme="light">
  <header class="ilp-sp-header">
    <h1><span>Leyes-Plus Argentina</span></h1>
    <div class="ilp-theme-dots" id="ilp-sp-themes">
      <button class="ilp-theme-dot" data-theme="light" title="Claro"></button>
      <button class="ilp-theme-dot" data-theme="sepia" title="Sepia"></button>
      <button class="ilp-theme-dot" data-theme="dark" title="Oscuro"></button>
    </div>
  </header>
  <nav class="ilp-sp-tabs">
    <button class="ilp-sp-tab active" data-tab="search">Buscar</button>
    <button class="ilp-sp-tab" data-tab="history">Historial</button>
    <button class="ilp-sp-tab" data-tab="favorites">Favoritos</button>
  </nav>
  <main class="ilp-sp-main" id="ilp-sp-main">
    <p class="ilp-sp-empty">El side panel completo llega en MVP3. Por ahora, usá la búsqueda en la página principal.</p>
  </main>
  <script src="sidepanel.js"></script>
</body>
</html>
